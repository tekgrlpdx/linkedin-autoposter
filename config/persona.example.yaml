# Persona configuration - defines your writing voice for LinkedIn posts.
# This is a USER LAYER file - the system will never auto-overwrite it.
#
# Run /linkedin persona to configure this interactively.
# Copy this file to persona.yaml to get started manually.

# Tone presets: professional | casual | educational | custom
tone: custom

# Custom tone description (used when tone: custom)
tone_description: "Describe your tone here. e.g. Casual-professional blend. Conversational and approachable but credible and clear."

# Free-text style instructions for Claude.
style_notes: |
  - Add your style rules here
  - Example: Open with warmth or a hook
  - Example: Close by inviting the reader into the conversation
  - Example: Use occasional emojis, not heavy
  - Example: Use 3-9 targeted hashtags per post

# Style summary (auto-generated by /linkedin persona from your writing samples)
style_summary: ""

# Directory containing writing samples (.txt or .md files).
# Claude reads these at generation time to match your voice.
samples_dir: samples/

# Set to false to temporarily disable persona (uses generic tone).
active: true
