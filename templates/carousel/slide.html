<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1080">
<style>
{{styles}}
</style>
</head>
<body class="slide slide--{{slide_type}}">
  <div class="slide__container">
    <div class="slide__content">
      <h1 class="slide__title">{{title}}</h1>
      <div class="slide__body">{{body}}</div>
    </div>
    <div class="slide__footer">
      <span class="slide__number">{{slide_number}} / {{total_slides}}</span>
    </div>
  </div>
</body>
</html>
